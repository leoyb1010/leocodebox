<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>leocodebox</title>
    <style>
      html, body { margin: 0; height: 100%; background: #0a0a0a; color: #fafafa; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { box-sizing: border-box; padding: 28px; overflow: hidden; }
      .shell { height: 100%; display: flex; flex-direction: column; gap: 16px; }
      .status { display: flex; flex: 0 0 auto; align-items: center; gap: 10px; color: #d4d4d4; }
      .dot { width: 8px; height: 8px; border-radius: 50%; background: #0b60ea; box-shadow: 0 0 0 6px rgba(11, 96, 234, 0.15); }
      pre { margin: 0; flex: 1; overflow: auto; border: 1px solid #262626; border-radius: 8px; background: #050505; color: #d4d4d4; padding: 14px; font: 12px/1.55 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; white-space: pre-wrap; user-select: text; }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="status"><span class="dot" aria-hidden="true"></span><span id="message">正在启动本地 leocodebox...</span></div>
      <pre id="logs">正在等待服务输出...</pre>
    </main>
    <script>
      window.leocodeboxRenderPlaceholder = function (payload) {
        var next = payload || {};
        document.title = String(next.title || 'leocodebox');
        document.getElementById('message').textContent = String(next.message || '正在打开 leocodebox...');
        document.getElementById('logs').textContent = Array.isArray(next.logs) && next.logs.length
          ? next.logs.map(String).join('\n')
          : '正在等待服务输出...';
      };
    </script>
  </body>
</html>
