name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: macos-14 # Apple silicon runner: matches the arm64 native modules (better-sqlite3, node-pty).
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # test:server and the desktop tests run under Electron, so the native
      # modules (better-sqlite3, node-pty) must be built for Electron's ABI, not
      # the node ABI that `npm ci` installs. Without this, test:server fails with
      # NODE_MODULE_VERSION mismatch.
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build (client + server)
        run: npm run build
